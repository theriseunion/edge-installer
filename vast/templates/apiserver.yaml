apiVersion: v1
kind: Service
metadata:
  labels:
    app: apiserver
    app.kubernetes.io/component: apiserver
    app.kubernetes.io/created-by: apiserver-project
    app.kubernetes.io/instance: edge-apiserver
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: service
    app.kubernetes.io/part-of: apiserver-project
    component: apiserver
  name: edge-edge-apiserver
  namespace: edge-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app: apiserver
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: apiserver-project
    app.kubernetes.io/instance: apiserver-rolebinding
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: clusterrolebinding
    app.kubernetes.io/part-of: apiserver-project
  name: edge-apiserver-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edge-manager-role
subjects:
- kind: ServiceAccount
  name: edge-apiserver
  namespace: edge-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: apiserver
    app.kubernetes.io/component: apiserver
    app.kubernetes.io/created-by: apiserver-project
    app.kubernetes.io/instance: apiserver
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: deployment
    app.kubernetes.io/part-of: apiserver-project
    component: apiserver
  name: edge-apiserver
  namespace: edge-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apiserver
  template:
    metadata:
      labels:
        app: apiserver
    spec:
      containers:
      - args:
        - --config=/etc/edge/apiserver.yaml
        - --authorization-mode=AlwaysAllow
        - --v=5
        env:
        - name: PORT
          value: "8443"
        - name: CAMP_NS
          value: rise-vast-system
        image: quanzhenglong.com/edge/apiserver:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /livez
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 20
        name: apiserver
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        - mountPath: /etc/edge
          name: apiserver-config
          readOnly: true
      securityContext:
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      serviceAccountName: edge-apiserver
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          secretName: apiserver-cert
      - configMap:
          name: edge-apiserver-config
        name: apiserver-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: apiserver
    app.kubernetes.io/created-by: apiserver-project
    app.kubernetes.io/instance: apiserver
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: serviceaccount
    app.kubernetes.io/part-of: apiserver-project
  name: edge-apiserver
  namespace: edge-system
