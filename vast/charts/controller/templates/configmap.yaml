apiVersion: v1
data:
  controller.yaml: |-
    # 指标监控配置
    metrics:
      # 是否启用metrics功能
      enabled: true

      # Prometheus配置
      prometheus:
        # Prometheus服务端点
        # 集群内: http://prometheus.observability-system.svc.cluster.local:9090
        # 集群外: http://localhost:9090
        endpoint: "http://10.100.121.67:30190/"

        # 认证
        auth: ""

        # 查询超时时间
        timeout: "30s"

        # 最大并发查询数
        maxConcurrentQueries: 10

        # 重试配置
        retryCount: 3
        retryInterval: "1s"

        # TLS配置（开发环境可以跳过验证）
        tlsInsecureSkipVerify: true
    deviceManager:
      hamiDeviceConfig: "config/device.yaml"
    device_plugin:
      nvidia-hami:
        mem_factor: 1
        node_label:
          key: gpu-test
          value: "on"
      hygon-hami:
        mem_factor: 1
        node_label:
          key: dcu-test
          value: "on"
      cambricon-hami:
        mem_factor: 1
        node_label:
          key: mlu-test
          value: "on"
      kunlunxin-hami:
        mem_factor: 1
        node_label:
          key: xpu-test
          value: "on"
      ascend-hami:
        mem_factor: 1
        node_label:
          key: ascend-test
          value: "on"
      iluvatar-hami:
        mem_factor: 256
        node_label:
          key: iluvatar-test
          value: "on"
      metax-hami:
        mem_factor: 1
        node_label:
          key: metax-test
          value: "on"
      enflame-hami:
        mem_factor: 1
        node_label:
          key: gcu-test
          value: "on"
      alibaba-hami:
        mem_factor: 1
        node_label:
          key: ppu-test
          value: "on"
      nvidia-volcano:
        mem_factor: 10
        node_label:
          key: volcano
          value: "on"
      ascend-volcano:
        mem_factor: 1
        node_label:
          key: volcano_ascend-test
          value: "on"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: apiserver-project
    app.kubernetes.io/instance: controller-config
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: configmap
    app.kubernetes.io/part-of: apiserver-project
    control-plane: controller-manager
  name: edge-controller-config
  namespace: edge-system
